apiVersion: apps/v1
kind: Deployment
metadata:
  name: ot-twin-api
  namespace: ot-digital-twin
  labels:
    app: ot-twin-api
    part-of: ot-digital-twin
    version: v1.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ot-twin-api
  template:
    metadata:
      labels:
        app: ot-twin-api
    spec:
      containers:
      - name: api
        image: ot-twin-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: SYNTHETIC_NOTICE
          value: "SYNTHETIC DATA: All readings are computer-generated. Not representative of any real client operational data."
        - name: MAXIMO_BASE_URL
          valueFrom:
            secretKeyRef:
              name: maximo-credentials
              key: url
        - name: MAXIMO_USERNAME
          valueFrom:
            secretKeyRef:
              name: maximo-credentials
              key: username
        - name: MAXIMO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maximo-credentials
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ot-twin-api
  namespace: ot-digital-twin
spec:
  selector:
    app: ot-twin-api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
