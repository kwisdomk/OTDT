apiVersion: apps/v1
kind: Deployment
metadata:
  name: ot-twin-unity
  namespace: ot-digital-twin
  labels:
    app: ot-twin-unity
    part-of: ot-digital-twin
    version: v1.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ot-twin-unity
  template:
    metadata:
      labels:
        app: ot-twin-unity
    spec:
      containers:
      - name: unity-webgl
        image: ot-twin-unity:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ot-twin-unity
  namespace: ot-digital-twin
spec:
  selector:
    app: ot-twin-unity
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ot-twin-unity
  namespace: ot-digital-twin
  annotations:
    haproxy.router.openshift.io/timeout: 60s
spec:
  to:
    kind: Service
    name: ot-twin-unity
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
