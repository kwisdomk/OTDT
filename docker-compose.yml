version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: otdt-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - otdt-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: otdt-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - otdt-network

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: otdt-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: otdt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - otdt-network

  redis:
    image: redis:7-alpine
    container_name: otdt-redis
    ports:
      - "6379:6379"
    networks:
      - otdt-network

volumes:
  timescaledb-data:

networks:
  otdt-network:
    driver: bridge
