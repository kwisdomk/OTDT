services:

  # ── Infrastructure ─────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: otdt-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - otdt-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: otdt-kafka
    ports:
      - "9092:9092"   # internal (container-to-container)
      - "29092:29092" # external (host machine access)
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual listener: internal for containers, external for host
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 1
    networks:
      - otdt-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: otdt-timescaledb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: otdt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - otdt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d otdt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: otdt-redis
    ports:
      - "6379:6379"
    networks:
      - otdt-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ───────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: otdt-api
    ports:
      - "8000:8000"
    env_file:
      - .env.demo
    environment:
      # Override .env.demo with container-internal addresses
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_SENSORS: sensor.telemetry
      REDIS_URL: redis://redis:6379
      TIMESCALEDB_URL: postgresql://postgres:password@timescaledb:5432/otdt
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - otdt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  simulator:
    build:
      context: ./sensor_simulator
      dockerfile: Dockerfile
    container_name: otdt-simulator
    env_file:
      - .env.demo
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: sensor.telemetry
      PUBLISH_INTERVAL_SECONDS: "1"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - otdt-network
    restart: unless-stopped
    command: ["python", "kafka_publisher.py", "--demo"]

  frontend:
    build:
      context: ./frontend/react-dashboard
      dockerfile: Dockerfile
      args:
        # The browser connects to localhost:8000 from the user's machine
        REACT_APP_WS_URL: ws://localhost:8000/twin/stream
        REACT_APP_API_URL: http://localhost:8000
    container_name: otdt-frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - otdt-network
    restart: unless-stopped

volumes:
  timescaledb-data:

networks:
  otdt-network:
    driver: bridge
